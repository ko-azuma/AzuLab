<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}管理画面{% endblock %}</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    header {
      display: flex;
      align-items: center;
      background: #222;
      padding: 10px 20px;
    }

    /* ロゴ */
    .logo {
      font-family: "MS Mincho", "ＭＳ 明朝", serif;
      font-size: 24px;
      color: white;
      text-decoration: none;
    }

    /* ナビ */
    nav {
      margin-left: auto; /* 右に寄せる */
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 30px;
    }
  </style>
</head>

<body>

<header>
  <!-- AzuLab（ダッシュボード） -->
  <a href="/dashboard" class="logo">AzuLab</a>

  <!-- 右側メニュー -->
  <nav>
    <a href="/works/add">作品追加</a>
    <a href="/articles/add">記事追加</a>
    <a href="/logout">ログアウト</a>
  </nav>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
