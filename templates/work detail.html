{% extends "header.html" %}
{% block content %}

<div class="detail-container">

  <h1>{{ work.wrk_nm }}</h1>

  <img src="{{ url_for('static', filename=work.wrk_img_pt or 'noimage.png') }}" class="detail-img">

  <p>{{ work.wrk_dtl }}</p>

  {% if work.wrk_url %}
    <a href="{{ work.wrk_url }}" target="_blank">作品を見る</a>
  {% endif %}

</div>

{% endblock %}
