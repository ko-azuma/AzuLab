<!-- 最新作品 -->
<div class="column">
  <h2>最新の作品</h2>

  {% for work in works %}
    <div class="card">
      <h3>
        <a href="/works/{{ work.id }}">
          {{ work.title }}
        </a>
      </h3>
      <p>{{ work.description }}</p>
    </div>
  {% endfor %}
</div>

<!-- 最新記事 -->
<div class="column">
  <h2>最新の記事</h2>

  {% for article in articles %}
    <div class="card">
      <h3>
        <a href="/articles/{{ article.id }}">
          {{ article.title }}
        </a>
      </h3>
      <p>{{ article.description }}</p>
    </div>
  {% endfor %}
</div>
