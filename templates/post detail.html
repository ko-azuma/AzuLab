{% extends "header.html" %}
{% block content %}

<div class="detail-container">

  <h1>{{ article.blg_nm }}</h1>

  <img src="{{ url_for('static', filename=article.blg_img_pt or 'noimage.png') }}" class="detail-img">

  <p>{{ article.blg_dtl }}</p>

  {% if article.blg_url %}
    <a href="{{ article.blg_url }}" target="_blank">記事を見る</a>
  {% endif %}

</div>

{% endblock %}
