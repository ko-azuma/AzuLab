{% extends "header.html" %}
{% block content %}

<h1 class="page-title">ログイン</h1>

<form method="POST">

  <label>メールアドレス（ID）</label><br>
  <input type="text" name="usr_id" required><br><br>

  <label>パスワード</label><br>
  <input type="password" name="password" required><br><br>

  <button type="submit">ログイン</button>
</form>

<p>
  <a href="{{ url_for('password_reset_request') }}">パスワードを忘れた方</a>
</p>

<p>
  <a href="{{ url_for('unlock_request') }}">アカウントロック解除</a>
</p>
{% endblock %}
