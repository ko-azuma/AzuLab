{% extends "header login.html" %}

{% block content %}

<h1 class="page-title">作品追加</h1>

<form method="POST" enctype="multipart/form-data">

  <label>作品名</label><br>
  <input type="text" name="wrk_nm" required><br><br>

  <label>画像</label><br>
  <input type="file" name="image"><br><br>

  <label>カテゴリー</label><br>
  <input type="text" name="wrk_ctg"><br><br>

  <label>詳細</label><br>
  <textarea name="wrk_dtl"></textarea><br><br>

  <label>URL</label><br>
  <input type="text" name="wrk_url"><br><br>

  <button type="submit">追加</button>

</form>

{% endblock %}
